<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Bus body -->
  <rect x="6" y="18" width="52" height="30" rx="6" fill="#ffffff"/>
  <!-- Roof ridge -->
  <rect x="10" y="14" width="44" height="8" rx="4" fill="#ffffff" opacity="0.9"/>
  <!-- Windows row -->
  <rect x="11" y="22" width="10" height="8" rx="2" fill="#2557A7"/>
  <rect x="25" y="22" width="10" height="8" rx="2" fill="#2557A7"/>
  <rect x="39" y="22" width="10" height="8" rx="2" fill="#2557A7"/>
  <!-- Door -->
  <rect x="44" y="32" width="9" height="12" rx="2" fill="#2557A7"/>
  <!-- Bottom stripe -->
  <rect x="6" y="40" width="52" height="5" rx="0" fill="#F59E0B"/>
  <!-- Underbody -->
  <rect x="6" y="45" width="52" height="3" rx="0" fill="#1A3C6E"/>
  <!-- Left wheel -->
  <circle cx="18" cy="50" r="6" fill="#1A3C6E"/>
  <circle cx="18" cy="50" r="3" fill="#ffffff"/>
  <!-- Right wheel -->
  <circle cx="46" cy="50" r="6" fill="#1A3C6E"/>
  <circle cx="46" cy="50" r="3" fill="#ffffff"/>
  <!-- Headlight -->
  <rect x="7" y="28" width="4" height="5" rx="1" fill="#FCD34D"/>
</svg>
